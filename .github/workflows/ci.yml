name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-test:
    name: Build, test & coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Buelo.slnx

      - name: Build
        run: dotnet build Buelo.slnx --no-restore --configuration Release

      - name: Test + coverage
        run: >
          dotnet test Buelo.slnx --no-build --configuration Release
          --collect:"XPlat Code Coverage" --settings coverlet.runsettings
          --results-directory ./TestResults

      - name: Vulnerable dependency scan
        run: |
          dotnet list Buelo.slnx package --vulnerable --include-transitive 2>&1 | tee vuln.txt
          if grep -Eiq '\b(High|Critical)\b' vuln.txt; then
            echo "::error::High/Critical vulnerable NuGet packages found — see the log above."
            exit 1
          fi
          echo "No High/Critical vulnerable packages."

      - name: Coverage report
        if: always()
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          reportgenerator \
            -reports:'TestResults/**/coverage.cobertura.xml' \
            -targetdir:coverage-report \
            -reporttypes:'TextSummary;Html'
          echo '### Backend coverage' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat coverage-report/Summary.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage-report
