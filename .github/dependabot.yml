# Automated dependency updates. Dependabot opens PRs (which run CI) when newer versions or
# security fixes are available. See BueloApi/CLAUDE.md for the commit/push policy.
version: 2
updates:
  # NuGet packages across the solution (Buelo.slnx).
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Batch the Microsoft/EF/ASP.NET families so version-locked packages bump together.
      dotnet-platform:
        patterns:
          - "Microsoft.*"
          - "System.*"
    labels:
      - dependencies

  # The GitHub Actions used by the CI workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
