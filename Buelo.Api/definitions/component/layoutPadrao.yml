kind: component
name: layoutPadrao
# Layout padrão por composição (substitui herança): cabeçalho da empresa + título,
# depois injeta o conteúdo do report no slot "content".
params:
  titulo:  { type: string }
  empresa: { type: string, default: "Contar Consultoria e Contabilidade" }
slots: [content]
body:
  - text: { value: "{{ empresa }}", class: empresa }
  - text: { value: "{{ titulo }}", class: titulo }
  - divider: { color: "#CCCCCC", thickness: 1 }
  - spacer: 8
  - slot: content
