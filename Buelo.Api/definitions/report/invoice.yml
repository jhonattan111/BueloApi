kind: report
name: invoice
# Invoice: default layout (component) + item table with aggregated total (blueprint §5).
import:
  - styles: corporate
  - component: defaultLayout
  - theme: corporate
use: defaultLayout
with:
  title: "Invoice #{{ data.invoiceNumber }}"
content:
  - text:
      value: "Customer: {{ data.customer.name }}  ·  CNPJ {{ data.customer.cnpj | cnpj }}"
      class: subtitle
  - spacer: 10
  - table:
      data: data.items
      rowStyle: { paddingY: 5, borderBottom: "1px #DDDDDD" }
      columns:
        - { width: 24px, header: "#",         cell: "{{ index + 1 }}" }
        - { width: 4*,   header: "Product",   cell: "{{ item.name }}" }
        - { width: 1*,   header: "Unit",      cell: "{{ moeda(item.price) }}", class: monetary }
        - { width: 1*,   header: "Qty",       cell: "{{ item.qty }}", align: right }
        - { width: 2*,   header: "Total",     cell: "{{ moeda(item.price * item.qty) }}", class: monetary }
      footer:
        - { span: 4, text: "Invoice total", class: totalLabel }
        - { text: "{{ moeda(sum(data.items, 'price * qty')) }}", class: monetary }
