kind: report
name: hello
# Minimal declarative report: rich content (markdown) + footer with page numbering.
meta:
  page: { size: A4, margin: "2cm" }
footer:
  - text: { value: "Page {{ page }} of {{ pageCount }}", style: { align: center, size: 9, color: "#999999" } }
content:
  - markdown: |
      # Hello, {{ data.name }}!

      This is a **declarative** Buelo report — written in YAML and rendered
      with QuestPDF, *without C#*.

      - Rich content via markdown
      - `{{ }}` expressions resolved against the data
      - Page numbering in the footer
