kind: validator
name: cpf
# Tier 1 (declarative): format + 11 digits + mod11 checksum of the 1st check digit.
# Use via POST api/validate-data { validator: "cpf", value: "...", modules: [<this yaml>] }.
format: "###.###.###-##"
rules:
  - { digits: 11 }
  - { checksum: { scheme: mod11, weights: [10, 9, 8, 7, 6, 5, 4, 3, 2] } }
