kind: validator
name: cpf
# Degrau 1 (declarativo): formato + 11 dígitos + checksum mod11 do 1º dígito verificador.
# Use via POST api/validate-data { validator: "cpf", value: "...", modules: [<este yaml>] }.
format: "###.###.###-##"
rules:
  - { digits: 11 }
  - { checksum: { scheme: mod11, weights: [10, 9, 8, 7, 6, 5, 4, 3, 2] } }
